questions:
  - id: "q1"
    type: single_choice
    prompt: "У чому ключова різниця між інструментами Edit та Write у Claude Code?"
    points: 1
    options:
      - "Edit швидший; Write точніший"
      - "Edit виконує точкові заміни рядків у існуючих файлах; Write створює або повністю перезаписує файл"
      - "Edit працює лише з файлами коду; Write працює з будь-яким типом файлів"
      - "Різниці немає — це псевдоніми однієї операції"
    correct_answer: 1
    explanation: "Інструмент Edit виконує хірургічні заміни — він знаходить точний рядок у файлі і замінює його, залишаючи все інше без змін. Інструмент Write створює нові файли або повністю перезаписує існуючі. Використовуйте Edit для точкових змін, Write — для нових файлів."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "При реалізації темної теми Claude додає CSS-змінні під `[data-theme='dark']`. Який інструмент він використовує для цього?"
    points: 1
    options:
      - "Інструмент Write — він перезаписує весь CSS-файл"
      - "Інструмент Edit — він знаходить існуючу секцію CSS і точно вставляє новий блок"
      - "Інструмент Bash — він запускає команду sed"
      - "Інструмент Grep — він замінює збіги на місці"
    correct_answer: 1
    explanation: "Інструмент Edit ідеально підходить для цього. Він знаходить точну позицію у CSS-файлі і додає блок темної теми. Без вгадування регулярних виразів, без випадкових змін в інших частинах файлу — хірургічна точність."
    review_link: ""

  - id: "q3"
    type: scenario_best_action
    prompt: "Ви попросили Claude реалізувати темну тему. Dev-сервер працює, і ви бачите результат у браузері. Фон бічної панелі занадто світлий — ви хочете темніший. Який найефективніший підхід?"
    points: 2
    options:
      - "Знайти CSS-файл, вручну змінити hex-код і оновити браузер"
      - "Сказати Claude звичайною мовою: 'зроби бічну панель темнішою' — і дозволити йому знайти та відредагувати відповідне CSS-значення"
      - "Використати `/clear` і почати реалізацію теми заново"
      - "Написати детальну технічну специфікацію з точним hex-значенням"
    correct_answer: 1
    explanation: "Це ітеративне уточнення в дії. Ви описуєте, що хочете, звичайною мовою, і Claude знаходить потрібний файл, визначає потрібне значення і вносить зміни. Це набагато швидше, ніж самостійно шукати у CSS-файлах, і є одним з найсильніших робочих процесів Claude Code."
    review_link: ""

  - id: "q4"
    type: true_false
    prompt: "Claude Code може додавати файли до індексу, писати повідомлення комітів та створювати git-коміти — все без виходу з термінальної сесії."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 0
    explanation: "Правильно. Claude Code має повну інтеграцію з git через інструмент Bash. Він може виконувати `git add`, писати осмислене повідомлення коміту на основі змін та виконувати `git commit` — все в тій самій сесії, де ви вносили зміни."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Що слід зробити після того, як Claude реалізував темну тему, перед комітом?"
    points: 1
    options:
      - "Закомітити негайно — швидкість понад усе"
      - "Запустити набір тестів через Claude, щоб виявити регресії"
      - "Видалити файл CLAUDE.md, щоб він не заважав"
      - "Вручну переглянути кожен рядок коду, написаний Claude"
    correct_answer: 1
    explanation: "Запуск тестів перед комітом критично важливий. Claude Code може запустити ваш набір тестів та лінтер, щоб переконатися, що зміни теми нічого не зламали. Це частина здорового робочого процесу: реалізувати, протестувати, потім закомітити."
    review_link: ""

  - id: "q6"
    type: multi_select
    prompt: "Які компоненти системи тем ai-coderrank змінюються під час реалізації темної теми? (Оберіть усі правильні)"
    points: 2
    options:
      - "tailwind.config.ts — визначає кольорову палітру та стратегію темного режиму"
      - "Глобальні CSS-змінні — оголошує --background, --foreground, --accent тощо"
      - "ThemeProvider — React-контекст, що керує станом світлої/темної теми"
      - "package.json — додає нову залежність для темної теми"
    correct_answer: [0, 1, 2]
    explanation: "Реалізація темної теми змінює конфігурацію Tailwind, CSS-змінні та ThemeProvider. Нові npm-пакети не потрібні — існуюча архітектура вже підтримує теми через CSS-змінні та контекст-провайдер."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Чому інструмент Edit описується як 'хірургічний' порівняно з ручним редагуванням файлів?"
    points: 1
    options:
      - "Він використовує просунутий ШІ для передбачення того, що ви хочете змінити"
      - "Він вказує точний рядок для пошуку та точну заміну — без регулярних виразів, без випадкових змін в інших файлах"
      - "Він блокує файл, щоб інший процес не міг змінити його одночасно"
      - "Він автоматично створює резервну копію перед кожною правкою"
    correct_answer: 1
    explanation: "Інструмент Edit працює за точним збігом рядків — він знаходить конкретний рядок у файлі та замінює його іншим. Це означає відсутність помилок регулярних виразів, випадкових змін не того рядка, а зміни обмежені саме тим, що було вказано."
    review_link: ""
