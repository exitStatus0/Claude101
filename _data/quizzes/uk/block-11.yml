questions:
  - id: "q1"
    type: single_choice
    prompt: "Що таке суб-агенти в Claude Code?"
    points: 1
    options:
      - "Окремі облікові записи Claude, що спільно використовують підписку"
      - "Менші екземпляри LLM, які Claude Code запускає для самостійного виконання сфокусованих завдань"
      - "Сторонні плагіни, встановлені з маркетплейсу"
      - "Фонові процеси, що відстежують зміни у файлах"
    correct_answer: 1
    explanation: "Суб-агенти — це сфокусовані екземпляри LLM, які Claude Code запускає для виконання конкретних підзавдань. Вони працюють з вужчою областю та можуть використовувати підмножину інструментів."
    review_link: ""

  - id: "q2"
    type: multi_select
    prompt: "Які з наступних є вбудованими типами суб-агентів у Claude Code? (Оберіть усі правильні.)"
    points: 1
    options:
      - "Explore"
      - "Plan"
      - "Compile"
      - "Agent (Task)"
    correct_answer: [0, 1, 3]
    explanation: "Explore (дослідження лише для читання), Plan (планування архітектури/дизайну) та Agent/Task (делеговане виконання підзавдань) є вбудованими типами суб-агентів. Compile не є вбудованим суб-агентом."
    review_link: ""

  - id: "q3"
    type: single_choice
    prompt: "Що контролює поле 'model:' у визначенні користувацького суб-агента?"
    points: 1
    options:
      - "Візуальну тему виводу суб-агента"
      - "Яку модель LLM суб-агент використовує для інференсу"
      - "Максимальний обсяг пам'яті для суб-агента"
      - "Мову програмування, на якій спеціалізується суб-агент"
    correct_answer: 1
    explanation: "Поле 'model:' вказує, яку модель LLM має використовувати суб-агент. Це дозволяє обирати швидшу/дешевшу модель для простих завдань або більш потужну для складних."
    review_link: ""

  - id: "q4"
    type: single_choice
    prompt: "Що робить поле 'tools:' у визначенні користувацького суб-агента?"
    points: 1
    options:
      - "Встановлює нові CLI-інструменти в системі"
      - "Обмежує набір інструментів, які суб-агент може використовувати"
      - "Перераховує npm-пакети, від яких залежить суб-агент"
      - "Визначає гарячі клавіші для суб-агента"
    correct_answer: 1
    explanation: "Поле 'tools:' обмежує набір інструментів, доступних суб-агенту. Наприклад, ви можете обмежити суб-агента для досліджень лише інструментами для читання."
    review_link: ""

  - id: "q5"
    type: true_false
    prompt: "Ізоляція через worktree дозволяє суб-агенту працювати на окремій Git-гілці без втручання у вашу поточну робочу директорію."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 0
    explanation: "Ізоляція через Git worktree надає суб-агенту власну робочу директорію на окремій гілці, тому зміни його файлів не конфліктують з роботою основного агента або вашою власною."
    review_link: ""

  - id: "q6"
    type: single_choice
    prompt: "Чому ви можете призначити менш дорогу модель суб-агенту, що виконує просте завдання?"
    points: 1
    options:
      - "Дешевші моделі завжди швидші та точніші"
      - "Щоб зменшити витрати на API без втрати якості для простої роботи"
      - "Дорогі моделі не можуть використовуватися як суб-агенти"
      - "Суб-агенти зобов'язані використовувати модель, відмінну від батьківської"
    correct_answer: 1
    explanation: "Використання менш дорогої моделі для простих підзавдань (як пошук файлів або форматування) економить витрати на API, тоді як батьківський агент або інші суб-агенти обробляють складні міркування з більш потужною моделлю."
    review_link: ""

  - id: "q7"
    type: scenario_best_action
    prompt: "Вам потрібно, щоб Claude Code рефакторив модуль і одночасно писав тести для іншого модуля, без виникнення конфліктів злиття. Який найкращий підхід?"
    points: 2
    options:
      - "Попросити Claude спочатку зробити рефакторинг, потім тести послідовно"
      - "Вручну відкрити дві окремі сесії Claude Code"
      - "Використати суб-агентів з ізоляцією worktree, щоб кожне завдання виконувалося на своїй гілці паралельно"
      - "Скопіювати весь репозиторій у другу директорію і працювати з обома"
    correct_answer: 2
    explanation: "Суб-агенти з ізоляцією worktree — це спеціально створене рішення. Кожен суб-агент отримує власний Git worktree та гілку, що дозволяє паралельну роботу без конфліктів, а результати можна об'єднати назад."
    review_link: ""
