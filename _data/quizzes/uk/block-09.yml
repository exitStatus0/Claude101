questions:
  - id: "q1"
    type: single_choice
    prompt: "Що означає MCP у контексті Claude Code?"
    points: 1
    options:
      - "Multi-Channel Protocol"
      - "Model Context Protocol"
      - "Managed Cloud Platform"
      - "Message Communication Pipeline"
    correct_answer: 1
    explanation: "MCP розшифровується як Model Context Protocol. Це відкритий стандарт для підключення моделей ШІ до зовнішніх джерел даних та інструментів."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Який файл у репозиторії проєкту визначає MCP-сервери, які поширюються на всіх учасників?"
    points: 1
    options:
      - "~/.claude.json"
      - ".claude/settings.json"
      - ".mcp.json"
      - "mcp-config.yml"
    correct_answer: 2
    explanation: ".mcp.json у корені проєкту визначає конфігурації MCP-серверів, які комітяться в репозиторій і поширюються на учасників."
    review_link: ""

  - id: "q3"
    type: short_answer
    prompt: "Яка CLI-команда для додавання MCP-сервера до вашого проєкту в Claude Code?"
    points: 1
    accepted_answers:
      - "claude mcp add"
      - "/mcp add"
    explanation: "Команда 'claude mcp add' (або slash-команда '/mcp add' під час сесії) реєструє новий MCP-сервер для вашого проєкту."
    review_link: ""

  - id: "q4"
    type: true_false
    prompt: "Файл ~/.claude.json зберігає конфігурації MCP-серверів рівня користувача, які застосовуються до всіх ваших проєктів."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 0
    explanation: "~/.claude.json — це файл конфігурації рівня користувача. MCP-сервери, визначені тут, доступні у кожному проєкті, який ви відкриваєте з Claude Code, на відміну від .mcp.json, який обмежений проєктом."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "При налаштуванні GitHub MCP-сервера, який тип транспорту він зазвичай використовує?"
    points: 1
    options:
      - "http"
      - "stdio"
      - "websocket"
      - "grpc"
    correct_answer: 1
    explanation: "GitHub MCP-сервер (і більшість локальних MCP-серверів) використовує транспорт stdio, обмінюючись даними через стандартний ввід/вивід з MCP-процесом."
    review_link: ""

  - id: "q6"
    type: multi_select
    prompt: "Які з наступних тверджень про дозволи MCP у Claude Code є правильними? (Оберіть усі правильні.)"
    points: 1
    options:
      - "Інструменти MCP вимагають підтвердження користувача при першому використанні за замовчуванням"
      - "Ви можете додати конкретні MCP-інструменти до списку дозволених у settings.json"
      - "MCP-сервери завжди мають необмежений доступ до вашої файлової системи"
      - "MCP-сервери з проєктної області .mcp.json потребують довіри перед запуском їх інструментів"
    correct_answer: [0, 1, 3]
    explanation: "MCP-інструменти дотримуються тієї ж моделі дозволів, що й вбудовані інструменти: вони вимагають підтвердження при першому використанні, можуть бути додані до списку дозволених, а проєктні сервери з .mcp.json мають бути підтверджені як довірені. MCP-сервери НЕ отримують автоматично необмежений доступ до файлової системи."
    review_link: ""

  - id: "q7"
    type: scenario_best_action
    prompt: "Ваша команда хоче, щоб кожен розробник мав доступ до внутрішнього MCP-сервера бази знань компанії при роботі в монорепозиторії. Який найкращий підхід до налаштування?"
    points: 2
    options:
      - "Попросити кожного розробника додати його до свого ~/.claude.json вручну"
      - "Додати конфігурацію MCP-сервера до .mcp.json у корені репозиторію та закомітити"
      - "Створити хук, який запускає MCP-сервер на початку сесії"
      - "Задокументувати кроки налаштування в README і сподіватися, що всі їх виконають"
    correct_answer: 1
    explanation: "Додавання MCP-сервера до .mcp.json у корені репозиторію гарантує, що кожен учасник, який клонує репозиторій, автоматично отримає конфігурацію. Саме для цього призначений проєктний файл .mcp.json."
    review_link: ""

  - id: "q8"
    type: single_choice
    prompt: "Що відбувається, коли Claude Code вперше зустрічає MCP-сервер, визначений у .mcp.json?"
    points: 1
    options:
      - "Він підключається автоматично без жодного запиту"
      - "Він просить користувача підтвердити довіру до MCP-сервера перед підключенням"
      - "Він відмовляється підключатися, якщо сервер також не вказаний у ~/.claude.json"
      - "Він запускає сервер у ізольованому контейнері"
    correct_answer: 1
    explanation: "Для безпеки Claude Code запитує у користувача підтвердження довіри до проєктних MCP-серверів з .mcp.json перед підключенням, оскільки їх міг додати будь-хто з доступом до коміту."
    review_link: ""
