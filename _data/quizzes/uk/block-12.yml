questions:
  - id: "q1"
    type: single_choice
    prompt: "Що таке GitOps?"
    points: 1
    options:
      - "Хостинг-сервіс для Git, подібний до GitHub"
      - "Операційна модель, де Git є єдиним джерелом істини для декларативної інфраструктури та додатків"
      - "Git GUI-клієнт для DevOps-команд"
      - "Стратегія розгалуження для монорепозиторіїв"
    correct_answer: 1
    explanation: "GitOps — це операційна модель, яка використовує Git-репозиторії як єдине джерело істини. Зміни в інфраструктурі та додатках вносяться через Git-коміти, а автоматизований агент узгоджує живий стан відповідно."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Що таке 'цикл синхронізації' в ArgoCD?"
    points: 1
    options:
      - "CI/CD пайплайн, який запускається при кожному push"
      - "Безперервний процес узгодження, який порівнює бажаний стан у Git з живим станом кластера та виправляє розбіжності"
      - "Cron-завдання, яке створює резервну копію Git-репозиторію"
      - "Webhook, який сповіщає Slack про завершення деплоїв"
    correct_answer: 1
    explanation: "Цикл синхронізації ArgoCD безперервно порівнює оголошений стан у Git-репозиторії з фактичним станом у Kubernetes-кластері. Коли виявляється розбіжність, він синхронізує живий стан відповідно до Git."
    review_link: ""

  - id: "q3"
    type: short_answer
    prompt: "У лабораторному середовищі курсу, веб-інтерфейс ArgoCD відкритий на якому NodePort?"
    points: 1
    accepted_answers:
      - "30080"
      - "NodePort 30080"
      - "port 30080"
    explanation: "Лабораторне середовище курсу відкриває веб-інтерфейс ArgoCD на NodePort 30080, роблячи його доступним через IP-адресу вузла на цьому порту."
    review_link: ""

  - id: "q4"
    type: true_false
    prompt: "Самовідновлення ArgoCD означає, що якщо хтось вручну змінить ресурс у кластері, ArgoCD автоматично поверне його до стану, оголошеного у Git."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 0
    explanation: "З увімкненим самовідновленням ArgoCD виявляє ручні зміни (розбіжності) у кластері та автоматично повертає їх до бажаного стану, оголошеного в Git. Це забезпечує Git як єдине джерело істини."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Як команда /loop у Claude Code може бути корисною у GitOps-робочому процесі?"
    points: 1
    options:
      - "Вона створює нескінченні Git-гілки"
      - "Вона періодично опитує та моніторить ресурси, наприклад перевіряє статус синхронізації ArgoCD через інтервали"
      - "Вона перебирає всі файли у репозиторії та перевіряє їх лінтером"
      - "Вона перезапускає Kubernetes-кластер у циклі, поки він не стане здоровим"
    correct_answer: 1
    explanation: "Команда /loop запускає промпт або завдання з повторюваним інтервалом, що корисно для моніторингу статусу синхронізації ArgoCD, спостереження за здоров'ям подів або відстеження прогресу деплою."
    review_link: ""

  - id: "q6"
    type: single_choice
    prompt: "Що дозволяє команда /schedule у Claude Code?"
    points: 1
    options:
      - "Планувати зустрічі з вашою командою"
      - "Створювати cron-базовані віддалені агенти, які виконують завдання за повторюваним розкладом"
      - "Встановлювати таймер для поточної сесії кодування"
      - "Планувати Git-коміти на майбутню дату"
    correct_answer: 1
    explanation: "Команда /schedule створює заплановані віддалені агенти (тригери), які виконуються за cron-розкладом, забезпечуючи автоматизовані повторювані завдання, такі як щоденні ревью коду або періодичне обслуговування."
    review_link: ""

  - id: "q7"
    type: scenario_best_action
    prompt: "Ви запушили зміну маніфесту Kubernetes у Git, але ArgoCD показує додаток як 'OutOfSync' і синхронізація не проходить. Що слід зробити першим?"
    points: 2
    options:
      - "Видалити додаток ArgoCD і створити його заново"
      - "Перевірити деталі помилки синхронізації ArgoCD та різницю між бажаним та живим станом, щоб зрозуміти причину збою"
      - "Негайно відкотити Git-коміт без дослідження"
      - "Перезапустити поди сервера ArgoCD"
    correct_answer: 1
    explanation: "Перший крок — завжди дослідження. ArgoCD надає детальні повідомлення про помилки синхронізації та вигляд різниці, який точно показує, що відрізняється між Git (бажаний стан) та кластером (живий стан). Ця інформація спрямовує виправлення."
    review_link: ""

  - id: "q8"
    type: multi_select
    prompt: "Які з наступних є перевагами моделі GitOps? (Оберіть усі правильні.)"
    points: 1
    options:
      - "Повний аудит-трейл кожної зміни через Git-історію"
      - "Легкий відкат через скасування Git-коміту"
      - "Усуває потребу у будь-якому моніторингу або алертингу"
      - "Самовідновлення розбіжностей конфігурації"
    correct_answer: [0, 1, 3]
    explanation: "GitOps забезпечує аудит-трейл, легкий відкат та самовідновлення. Однак він НЕ усуває потребу в моніторингу та алертингу, які залишаються необхідними."
    review_link: ""
