questions:
  - id: "q1"
    type: single_choice
    prompt: "Як Claude Code виконує shell-команди на вашому комп'ютері?"
    points: 1
    options:
      - "Підключається до вашого комп'ютера через SSH з віддаленого сервера"
      - "Через інструмент Bash, який виконує команди у вашому терміналі з вашого дозволу"
      - "Записує скрипти на диск і просить вас запустити їх вручну"
      - "Команди виконуються в ізольованому Docker-контейнері"
    correct_answer: 1
    explanation: "Claude Code використовує інструмент Bash для виконання shell-команд безпосередньо у вашому терміналі. Перед запуском команди він показує, що хоче виконати, і запитує ваш дозвіл."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "У чому ключова різниця між `/clear` та `/compact`?"
    points: 1
    options:
      - "`/clear` стискає розмову; `/compact` видаляє її"
      - "`/clear` повністю стирає розмову; `/compact` створює її стислий виклад для звільнення контекстного вікна"
      - "Вони роблять одне й те саме, але `/compact` працює швидше"
      - "`/clear` видаляє лише вивід інструментів; `/compact` видаляє все"
    correct_answer: 1
    explanation: "`/clear` — це ядерний варіант: він стирає все і починає з нуля. `/compact` розумніший: Claude створює стислий виклад розмови у стиснутій формі, зберігаючи ключову інформацію та звільняючи контекстне вікно. Уявіть `/clear` як закриття всіх вкладок браузера, а `/compact` — як додавання важливих у закладки."
    review_link: ""

  - id: "q3"
    type: true_false
    prompt: "Коли Claude Code хоче виконати `npm install`, він виконує команду негайно без запитання."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 1
    explanation: "Неправильно. Модель дозволів Claude Code вимагає вашого підтвердження перед виконанням shell-команд. Ви побачите запит на кшталт 'Allow? (y/n)' перед запуском будь-чого. Це гарантує, що ви завжди контролюєте ситуацію."
    review_link: ""

  - id: "q4"
    type: scenario_best_action
    prompt: "Ви у довгій сесії Claude Code — ви запустили npm install, підняли dev-сервер, виправили дві помилки лінтера і зібрали Docker-образ. Відповіді Claude стають повільнішими та менш точними. Що робити?"
    points: 2
    options:
      - "Закрити термінал і перезапустити Claude Code з нуля"
      - "Використати `/compact` для створення стислого викладу розмови та звільнення контекстного вікна"
      - "Використати `/clear`, щоб стерти все і заново пояснити, що ви робили"
      - "Продовжувати — Claude сам керуватиме своїм контекстом"
    correct_answer: 1
    explanation: "`/compact` ідеально підходить у цій ситуації. Ви глибоко у сесії і хочете продовжити, але контекстне вікно заповнюється. `/compact` створює стислий виклад того, що відбулося, звільняючи місце та зберігаючи ключову інформацію. `/clear` втратив би весь контекст, і вам довелося б пояснювати все заново."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Під час сесії Claude Code ви навмисно вносите синтаксичну помилку у файл і просите Claude запустити тести. Що відбувається?"
    points: 1
    options:
      - "Claude відмовляється запускати тести, бо виявляє помилку"
      - "Claude запускає тести, зчитує вивід помилки, діагностує проблему та пропонує виправлення"
      - "Claude автоматично виправляє помилку перед запуском тестів"
      - "Команда тестів завершується з помилкою і Claude завершує сесію"
    correct_answer: 1
    explanation: "Claude запускає тести за запитом, бачить вивід помилки, аналізує повідомлення про помилки, а потім діагностує та пропонує виправлення. Це цикл 'зламати та виправити', який робить Claude потужним для налагодження — він зчитує реальний вивід помилок, а не здогадується."
    review_link: ""

  - id: "q6"
    type: multi_select
    prompt: "Що з перерахованого Claude Code може робити через інструмент Bash? (Оберіть усі правильні)"
    points: 2
    options:
      - "Виконати `npm install` для встановлення залежностей"
      - "Запустити dev-сервер за допомогою `npm run dev`"
      - "Зібрати Docker-образ за допомогою `docker build`"
      - "Виконати деплой безпосередньо на продакшн Kubernetes-кластер без підтвердження"
    correct_answer: [0, 1, 2]
    explanation: "Інструмент Bash може виконувати будь-яку shell-команду — npm, docker, kubectl тощо. Однак кожна команда вимагає вашого дозволу перед виконанням. Claude не може виконати деплой на продакшн (або будь-яку команду) без вашого явного підтвердження."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Коли найкраще використовувати `/clear` замість `/compact`?"
    points: 1
    options:
      - "Коли відповіді стають повільними"
      - "Коли ви переходите до абсолютно іншого завдання, не пов'язаного з поточною розмовою"
      - "В кінці кожної сесії як крок очистки"
      - "Після кожної збірки Docker"
    correct_answer: 1
    explanation: "`/clear` найкраще використовувати при переході до абсолютно іншого завдання. Оскільки він стирає весь контекст, ви починаєте з чистого аркуша — саме те, що потрібно, коли попередня розмова вже не актуальна. `/compact` краще, коли ви хочете продовжити поточну лінію роботи."
    review_link: ""
