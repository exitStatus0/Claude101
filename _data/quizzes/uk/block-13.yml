questions:
  - id: "q1"
    type: single_choice
    prompt: "Що означає 'headless-режим' при запуску Claude Code з 'claude -p'?"
    points: 1
    options:
      - "Claude працює без мовної моделі та використовує лише локальні інструменти"
      - "Claude працює неінтерактивно, обробляючи один промпт та повертаючи результат без TUI-сесії"
      - "Claude працює зі скороченим інтерфейсом, який приховує всі виклики інструментів"
      - "Claude працює без доступу до інтернету"
    correct_answer: 1
    explanation: "Headless-режим (claude -p) запускає Claude неінтерактивно. Ви передаєте промпт, він обробляє його, виводить результат і завершується. Інтерактивна TUI-сесія не запускається."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Що робить прапорець --output-format json при використанні з 'claude -p'?"
    points: 1
    options:
      - "Змушує Claude генерувати лише JSON-код у відповіді"
      - "Зберігає історію розмови у JSON-файл"
      - "Виводить повний результат як структурований JSON, зручний для програмного парсингу"
      - "Конвертує вихідні файли проєкту у формат JSON"
    correct_answer: 2
    explanation: "Прапорець --output-format json змушує Claude виводити відповідь як структурований JSON, що ідеально підходить для передачі в інші інструменти або скрипти для програмної обробки."
    review_link: ""

  - id: "q3"
    type: single_choice
    prompt: "Яке призначення команди /batch у Claude Code?"
    points: 1
    options:
      - "Пакетне перейменування файлів у проєкті"
      - "Запуск одного і того ж промпту для декількох файлів або контекстів паралельно"
      - "Пакетування API-запитів для зменшення витрат"
      - "Стискання декількох Git-комітів в один"
    correct_answer: 1
    explanation: "Команда /batch дозволяє запускати один і той самий промпт або завдання для декількох файлів, директорій або контекстів паралельно, значно прискорюючи повторювані операції."
    review_link: ""

  - id: "q4"
    type: true_false
    prompt: "Вивід 'claude -p' з --output-format json можна напряму передати через pipe у jq для подальшої обробки."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 0
    explanation: "Оскільки --output-format json створює валідний JSON на stdout, його можна напряму передати через pipe у jq або будь-який інший інструмент обробки JSON у shell-пайплайні."
    review_link: ""

  - id: "q5"
    type: multi_select
    prompt: "Які з наступних є коректними варіантами використання команд агентів (декілька агентів Claude, що працюють разом)? (Оберіть усі правильні.)"
    points: 1
    options:
      - "Один агент пише код, інший його ревьюїть"
      - "Паралельна міграція декількох мікросервісів"
      - "Агент-оркестратор, який делегує підзавдання спеціалізованим агентам"
      - "Повна заміна всіх розробників-людей у команді назавжди"
    correct_answer: [0, 1, 2]
    explanation: "Команди агентів відмінно справляються з розподілом роботи: написання/ревью, паралельні міграції та оркестроване делегування підзавдань. Вони доповнюють розробників-людей, а не замінюють їх."
    review_link: ""

  - id: "q6"
    type: single_choice
    prompt: "При побудові shell-пайплайну з Claude у headless-режимі, яка комбінація дозволяє передати промпт та отримати машинозчитуваний вивід?"
    points: 1
    options:
      - "claude --interactive --format json"
      - "claude -p \"your prompt\" --output-format json"
      - "claude --batch --json-output"
      - "claude run --prompt \"your prompt\" --json"
    correct_answer: 1
    explanation: "Правильний синтаксис — 'claude -p \"your prompt\" --output-format json'. Прапорець -p активує headless-режим, а --output-format json створює структурований JSON-вивід."
    review_link: ""

  - id: "q7"
    type: scenario_best_action
    prompt: "Вам потрібно додати заголовки ліцензій до 200 вихідних файлів у вашому проєкті. Який найефективніший підхід з Claude Code?"
    points: 2
    options:
      - "Відкрити інтерактивну сесію і попросити Claude редагувати кожен файл по одному"
      - "Використати /batch для запуску промпту вставки заголовка ліцензії для всіх 200 файлів паралельно"
      - "Написати скрипт sed вручну замість використання Claude"
      - "Використати headless-режим у for-циклі: 'for f in *.js; do claude -p \"add header to $f\"; done'"
    correct_answer: 1
    explanation: "/batch спеціально створений для запуску однієї операції для багатьох файлів паралельно. Це ефективніше за послідовний for-цикл і масштабніше, ніж інтерактивна робота по одному."
    review_link: ""

  - id: "q8"
    type: single_choice
    prompt: "З чого переважно складається ширша екосистема Claude Code?"
    points: 1
    options:
      - "Лише CLI-інструмент і нічого більше"
      - "CLI, GitHub Action, MCP-сервери, хуки, суб-агенти та headless/batch-режими, що формують розширювану платформу"
      - "Колекція розширень для VS Code"
      - "Веб-IDE з вбудованим деплоєм"
    correct_answer: 1
    explanation: "Екосистема Claude Code включає інтерактивний CLI, GitHub Action для CI, протокол MCP для зовнішніх інструментів, хуки для автоматизації життєвого циклу, суб-агенти для паралельної роботи та headless/batch-режими для скриптів — все це формує компоновану платформу."
    review_link: ""
