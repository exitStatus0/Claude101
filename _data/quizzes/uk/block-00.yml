questions:
  - id: "q1"
    type: single_choice
    prompt: "Який рекомендований спосіб встановлення Claude Code для нової установки?"
    points: 1
    options:
      - "Нативний інсталятор (curl -fsSL https://claude.ai/install.sh | bash)"
      - "pip install claude-code"
      - "Завантажити з App Store"
      - "Він встановлюється разом з Node.js"
    correct_answer: 0
    explanation: "Рекомендований шлях встановлення — нативний інсталятор. Homebrew та WinGet також підтримуються. npm install є альтернативою, але не основним методом."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Що відбувається при першому запуску команди `claude` після встановлення?"
    points: 1
    options:
      - "Завантажується модель ШІ на ваш комп'ютер"
      - "Відкривається вікно браузера для автентифікації з вашим обліковим записом Anthropic"
      - "Сканується вся файлова система на наявність проєктів з кодом"
      - "Автоматично створюється файл CLAUDE.md"
    correct_answer: 1
    explanation: "При першому запуску Claude Code відкриває процес автентифікації через браузер, щоб ви могли підключити свій обліковий запис Anthropic. Модель працює на сервері — нічого не завантажується локально."
    review_link: ""

  - id: "q3"
    type: true_false
    prompt: "Claude Code — це розширення IDE, яке працює лише у VS Code."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 1
    explanation: "Неправильно. Claude Code — це автономний термінальний агент. Він працює у будь-якому терміналі — macOS Terminal, iTerm2, термінали Linux або навіть у вбудованому терміналі VS Code. Це не розширення IDE."
    review_link: ""

  - id: "q4"
    type: single_choice
    prompt: "Який рівень підписки Anthropic включає доступ до Claude Code?"
    points: 1
    options:
      - "Безкоштовний рівень"
      - "Pro ($20/місяць)"
      - "Лише Enterprise"
      - "Лише оплата за токени через API"
    correct_answer: 1
    explanation: "Claude Code входить до підписки Anthropic Pro за $20/місяць. Для курсу не потрібні окремий API-білінг або корпоративний контракт."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Що відображає команда `/help` під час сесії Claude Code?"
    points: 1
    options:
      - "Повну документацію Anthropic API"
      - "Список доступних slash-команд, гарячих клавіш та порад щодо використання"
      - "Статистику білінгу та використання токенів"
      - "Покрокове керівництво по поточному проєкту"
    correct_answer: 1
    explanation: "`/help` показує доступні slash-команди, гарячі клавіші та швидкі поради для ефективного використання Claude Code. Це ваша довідкова картка під час сесії."
    review_link: ""

  - id: "q6"
    type: scenario_best_action
    prompt: "Ви щойно встановили Claude Code і вперше запустили `claude` у каталозі нового проєкту. Claude успішно автентифікувався і відкрив інтерактивну сесію. Що найкраще зробити першим?"
    points: 2
    options:
      - "Одразу попросити Claude рефакторити всю кодову базу"
      - "Ввести /help, щоб побачити доступні команди, а потім попросити Claude описати, що робить цей проєкт"
      - "Закрити сесію і спочатку написати файл CLAUDE.md вручну"
      - "Виконати /clear, щоб переконатися, що контекст порожній"
    correct_answer: 1
    explanation: "Початок з `/help` допоможе зорієнтуватися в доступних можливостях, а потім запит до Claude описати проєкт дозволить йому дослідити кодову базу і дати вам обґрунтований огляд. Переходити до рефакторингу без розуміння коду ризиковано; `/clear` у свіжій сесії не має сенсу."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Який навчальний проєкт використовується протягом курсу Claude Code 101?"
    points: 1
    options:
      - "Додаток списку справ на Express.js"
      - "ai-coderrank — дашборд на Next.js для порівняння моделей ШІ-кодування"
      - "Kubernetes-оператор на Go"
      - "Статичний блог на Jekyll"
    correct_answer: 1
    explanation: "Навчальний проєкт курсу — ai-coderrank, дашборд на Next.js 14, який порівнює моделі ШІ-кодування за продуктивністю та ціною. Він включає React, TypeScript, Docker, маніфести K8s та CI/CD — реалістичний full-stack проєкт."
    review_link: ""
