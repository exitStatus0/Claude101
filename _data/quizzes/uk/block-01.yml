questions:
  - id: "q1"
    type: single_choice
    prompt: "Що генерує команда `/init` у Claude Code?"
    points: 1
    options:
      - "Dockerfile для проєкту"
      - "Файл CLAUDE.md, який фіксує структуру проєкту, технологічний стек та конвенції"
      - "Файл .gitignore на основі виявленої мови програмування"
      - "Конфігурацію CI/CD пайплайну"
    correct_answer: 1
    explanation: "`/init` аналізує всю вашу кодову базу і генерує файл CLAUDE.md — машинозчитуваний посібник проєкту, який Claude завантажує на початку кожної сесії. Вважайте його документом для онбордингу Claude."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Який зв'язок між README.md та CLAUDE.md?"
    points: 1
    options:
      - "Це один і той самий файл з різними назвами"
      - "README.md — для людей, що приєднуються до команди; CLAUDE.md — для Claude, що приєднується до команди"
      - "CLAUDE.md замінює README.md у проєктах з пріоритетом ШІ"
      - "README.md завантажується Claude; CLAUDE.md — для людської довідки"
    correct_answer: 1
    explanation: "README.md написаний для розробників-людей. CLAUDE.md написаний для Claude Code — він фіксує конвенції, підводні камені та командні знання у форматі, який Claude автоматично зчитує на початку сесії."
    review_link: ""

  - id: "q3"
    type: multi_select
    prompt: "Які інструменти Claude Code використовує за лаштунками для дослідження кодової бази? (Оберіть усі правильні)"
    points: 2
    options:
      - "Read — відкриває та зчитує конкретний файл"
      - "Grep — шукає патерни у файлах"
      - "Glob — знаходить файли за шаблоном імені"
      - "Compile — збирає проєкт для перевірки помилок"
    correct_answer: [0, 1, 2]
    explanation: "Claude використовує три інструменти дослідження: Read (як `cat`), Grep (як `rg`) та Glob (як `find`). Інструменту Compile не існує — Claude використовує інструмент Bash для запуску команд збірки за потреби."
    review_link: ""

  - id: "q4"
    type: single_choice
    prompt: "Коли ви запитуєте Claude 'як працює перемикання теми?', що Claude робить внутрішньо?"
    points: 1
    options:
      - "Шукає патерни перемикання теми у своїх навчальних даних"
      - "Використовує Grep для пошуку коду, пов'язаного з темою, Read для вивчення файлів і Glob для пошуку конфігураційних файлів"
      - "Просить вас вказати на відповідний файл"
      - "Запускає додаток і перевіряє інтерфейс"
    correct_answer: 1
    explanation: "Claude ґрунтує свої відповіді на вашому реальному коді. Він використовує Grep для пошуку посилань на тему, Read для вивчення цих файлів і Glob для виявлення пов'язаних конфігурацій. Він не покладається лише на навчальні дані."
    review_link: ""

  - id: "q5"
    type: true_false
    prompt: "Після запуску `/init` не слід редагувати згенерований CLAUDE.md — Claude підтримує його в актуальному стані автоматично."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 1
    explanation: "Неправильно. Автоматично згенерований CLAUDE.md — це гарна відправна точка, але з часом його слід редагувати, додаючи командні конвенції, підводні камені та специфічні для проєкту патерни, які `/init` може не виявити."
    review_link: ""

  - id: "q6"
    type: scenario_best_action
    prompt: "Ви щойно приєдналися до нової команди і клонували репозиторій з 80+ файлами без документації. Ви хочете швидко зрозуміти архітектуру. Який найкращий підхід з Claude Code?"
    points: 2
    options:
      - "Читати кожен файл по одному за допомогою інструменту Read"
      - "Запустити `/init` для генерації CLAUDE.md, а потім у розмові попросити Claude пояснити архітектуру, потік даних та ключові патерни"
      - "Попросити Claude переписати проєкт мовою, яку ви знаєте краще"
      - "Пропустити дослідження і почати вносити зміни — розберетеся по ходу"
    correct_answer: 1
    explanation: "Запуск `/init` дає Claude (і вам) огляд проєкту. Потім дослідження через розмову — запитання про архітектуру, потік даних та дизайнерські рішення — дозволяє Claude читати код і давати вам обґрунтовані відповіді. Це набагато швидше, ніж читання файлів по одному."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Який інструмент Claude Code є найбільш аналогічним до запуску `rg 'pattern'` у терміналі?"
    points: 1
    options:
      - "Read"
      - "Glob"
      - "Grep"
      - "Bash"
    correct_answer: 2
    explanation: "Інструмент Grep шукає патерни у файлах, так само як `rg` (ripgrep). Read аналогічний `cat`, а Glob аналогічний `find`."
    review_link: ""
