questions:
  - id: "q1"
    type: single_choice
    prompt: "Як активувати режим Plan у Claude Code?"
    points: 1
    options:
      - "Введіть `/plan` або натисніть Shift+Tab перед відправкою повідомлення"
      - "Додайте слово 'plan' будь-де у вашому запиті"
      - "Claude завжди автоматично планує перед внесенням змін"
      - "Запустіть `claude --plan` при старті сесії"
    correct_answer: 0
    explanation: "Режим Plan активується введенням `/plan` або натисканням Shift+Tab. Це перемикає Claude з режиму 'виконавця' в режим 'мислителя' — він окреслить, що зробив би, і отримає ваше підтвердження перед будь-якими змінами файлів."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Що таке Architecture Decision Record (ADR)?"
    points: 1
    options:
      - "Повний проєктний документ, що охоплює всі аспекти системи"
      - "Короткий, чіткий документ, що фіксує конкретне технічне рішення та його обґрунтування"
      - "Запис у changelog, що автоматично генерується CI/CD"
      - "Коментар у коді, що пояснює складну функцію"
    correct_answer: 1
    explanation: "ADR — це легкий документ, що відповідає на одне ключове запитання: 'чому ми зробили цей вибір?' На відміну від проєктних документів, ADR короткі, чіткі та сфокусовані на одному рішенні — що робить їх дійсно корисними для майбутніх розробників."
    review_link: ""

  - id: "q3"
    type: true_false
    prompt: "Діаграми Mermaid — це файли зображень, які потрібно переекспортовувати щоразу при оновленні."
    points: 1
    options:
      - "Правильно"
      - "Неправильно"
    correct_answer: 1
    explanation: "Неправильно. Діаграми Mermaid є текстовими і написані у Markdown. GitHub рендерить їх нативно, вони версіонуються та зручні для перегляду змін. Ви редагуєте текст, а не зображення — крок експорту не потрібен."
    review_link: ""

  - id: "q4"
    type: scenario_best_action
    prompt: "Ваш тімлід просить вас реалізувати темну тему для всього додатку. Це торкнеться конфігурації Tailwind, CSS-змінних, ThemeProvider та багатьох компонентів. Який найкращий підхід з Claude Code?"
    points: 2
    options:
      - "Почати кодувати негайно — Claude достатньо швидкий, щоб виправляти помилки на ходу"
      - "Використати режим Plan, щоб Claude окреслив кожен файл і зміну, створити ADR для документування рішення, а потім переглянути план перед реалізацією"
      - "Попросити Claude згенерувати лише ADR і реалізувати тему вручну"
      - "Створити нову гілку і дозволити Claude змінювати файли випадково, поки не вийде правильно"
    correct_answer: 1
    explanation: "Для змін у багатьох файлах попереднє планування критично важливе. Режим Plan дозволяє Claude окреслити кожен файл, який він торкнеться, і кожну зміну, яку він зробить. ADR документує 'чому' для майбутньої довідки. Лише після перегляду та затвердження плану слід переходити до реалізації (Блок 4). Це запобігає антипатерну 'змінив 47 файлів і не пам'ятаю чому'."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Що відбувається, коли Claude знаходиться в режимі Plan?"
    points: 1
    options:
      - "Він читає код, але не може записувати файли або виконувати команди"
      - "Він окреслює, що зробив би, які файли змінив би, і чекає на ваше підтвердження перед виконанням"
      - "Він автоматично створює pull request із запропонованими змінами"
      - "Він запускає зміни в ізольованому середовищі для попереднього перегляду"
    correct_answer: 1
    explanation: "У режимі Plan Claude продумує проблему і показує вам структурований план: які файли змінити, які зміни внести і в якому порядку. Він нічого не виконує, поки ви не переглянете та не затвердите план."
    review_link: ""

  - id: "q6"
    type: multi_select
    prompt: "Які з наступних є обґрунтованими причинами для використання діаграм Mermaid у вашому проєкті? (Оберіть усі правильні)"
    points: 2
    options:
      - "Вони версіонуються разом з вашим кодом"
      - "GitHub рендерить їх нативно у Markdown-файлах"
      - "Вони створюють зображення вищої якості, ніж спеціалізовані інструменти для діаграм"
      - "Вони зручні для перегляду змін — можна побачити, що змінилося, при ревью PR"
    correct_answer: [0, 1, 3]
    explanation: "Діаграми Mermaid текстові, версіонуються, зручні для перегляду змін, і GitHub рендерить їх нативно. Вони можуть не створювати зображення найвищої якості порівняно з такими інструментами як Figma, але їхні переваги для робочого процесу розробника значні."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Які чотири файли документації створює Блок 3 у навчальному проєкті курсу?"
    points: 1
    options:
      - "README.md, CONTRIBUTING.md, CHANGELOG.md, LICENSE"
      - "docs/adr/001-dark-theme.md, docs/diagrams/infrastructure.md, docs/diagrams/traffic-flow.md, docs/diagrams/deployment-pipeline.md"
      - "CLAUDE.md, .claude/rules/theme.md, docs/theme-spec.md, tests/theme.test.md"
      - "plan.md, review.md, approve.md, implement.md"
    correct_answer: 1
    explanation: "Блок 3 створює ADR для рішення щодо темної теми та три діаграми Mermaid: топологію інфраструктури (DO + k3s), потік трафіку (маршрутизація запитів) та пайплайн деплою (CI/CD). Це артефакти, які створив би досвідчений інженер перед масштабною зміною."
    review_link: ""

  - id: "q8"
    type: short_answer
    prompt: "Яка гаряча клавіша перемикає режим Plan у Claude Code?"
    points: 1
    accepted_answers:
      - "Shift+Tab"
      - "shift+tab"
      - "Shift + Tab"
      - "shift + tab"
    explanation: "Натискання Shift+Tab перемикає між режимом Plan (мислення) та звичайним режимом (виконання). Також можна використовувати slash-команду `/plan`."
    review_link: ""
