questions:
  - id: "q1"
    type: single_choice
    prompt: "Where does user-level CLAUDE.md live?"
    points: 1
    options:
      - "~/.claude/CLAUDE.md"
      - "./CLAUDE.md"
      - "~/.config/claude/CLAUDE.md"
      - "/etc/claude/CLAUDE.md"
    correct_answer: 0
    explanation: "User-level instructions live at ~/.claude/CLAUDE.md and apply to all projects."

  - id: "q2"
    type: true_false
    prompt: "CLAUDE.local.md is intended to be committed to git."
    points: 1
    options:
      - "True"
      - "False"
    correct_answer: 1
    explanation: "CLAUDE.local.md is gitignored by convention. It holds personal/local overrides."

  - id: "q3"
    type: multi_select
    prompt: "Which of these are valid locations for project instructions? (Select all that apply)"
    points: 2
    options:
      - "./CLAUDE.md"
      - "./.claude/CLAUDE.md"
      - "./.claude/rules/*.md"
      - "./claude-instructions.txt"
    correct_answer: [0, 1, 2]
    explanation: "Claude reads CLAUDE.md, .claude/CLAUDE.md, and .claude/rules/*.md. There is no claude-instructions.txt convention."

  - id: "q4"
    type: short_answer
    prompt: "What slash command shows all loaded memory and instructions?"
    points: 1
    accepted_answers: ["/memory", "memory"]
    explanation: "/memory displays everything Claude has loaded: CLAUDE.md files, rules, and auto memory."

  - id: "q5"
    type: single_choice
    prompt: "What makes .claude/rules/ files special compared to CLAUDE.md?"
    points: 1
    options:
      - "They load conditionally based on file path patterns"
      - "They have higher priority than CLAUDE.md"
      - "They are encrypted"
      - "They only work in VS Code"
    correct_answer: 0
    explanation: "Rules files use path frontmatter to load only when working with matching files."

  - id: "q6"
    type: scenario_best_action
    prompt: "Your team has K8s conventions that only apply when editing manifests. Where should you put them?"
    points: 2
    options:
      - "In the project CLAUDE.md"
      - "In .claude/rules/k8s.md with a path filter for k8s/**"
      - "In ~/.claude/CLAUDE.md"
      - "In CLAUDE.local.md"
    correct_answer: 1
    explanation: "Path-specific rules in .claude/rules/ with a path filter load only when relevant, keeping other contexts clean."

  - id: "q7"
    type: single_choice
    prompt: "In the memory hierarchy, which has the highest priority?"
    points: 1
    options:
      - "User CLAUDE.md"
      - "Project CLAUDE.md"
      - "Managed Policy"
      - "Auto memory"
    correct_answer: 2
    explanation: "Managed Policy (organization-level) has the highest priority and cannot be overridden."
