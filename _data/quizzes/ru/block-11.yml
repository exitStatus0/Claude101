questions:
  - id: "q1"
    type: single_choice
    prompt: "Что такое суб-агенты в Claude Code?"
    points: 1
    options:
      - "Отдельные аккаунты Claude, разделяющие одну подписку"
      - "Менее крупные экземпляры LLM, порождаемые Claude Code для независимой обработки узких задач"
      - "Сторонние плагины, устанавливаемые из маркетплейса"
      - "Фоновые процессы, отслеживающие изменения файлов"
    correct_answer: 1
    explanation: "Суб-агенты — это сфокусированные экземпляры LLM, которые Claude Code порождает для обработки конкретных подзадач. Они работают с более узкой областью и могут использовать подмножество инструментов."
    review_link: ""

  - id: "q2"
    type: multi_select
    prompt: "Какие из перечисленных типов суб-агентов являются встроенными в Claude Code? (Выберите все подходящие.)"
    points: 1
    options:
      - "Explore"
      - "Plan"
      - "Compile"
      - "Agent (Task)"
    correct_answer: [0, 1, 3]
    explanation: "Explore (исследование только для чтения), Plan (планирование архитектуры/дизайна) и Agent/Task (делегирование подзадач) — встроенные типы суб-агентов. Compile не является встроенным суб-агентом."
    review_link: ""

  - id: "q3"
    type: single_choice
    prompt: "Что контролирует поле 'model:' в определении пользовательского суб-агента?"
    points: 1
    options:
      - "Визуальную тему вывода суб-агента"
      - "Какую LLM-модель суб-агент использует для инференса"
      - "Максимальное выделение памяти для суб-агента"
      - "Язык программирования, на котором специализируется суб-агент"
    correct_answer: 1
    explanation: "Поле 'model:' указывает, какую LLM-модель должен использовать суб-агент. Это позволяет выбрать более быструю/дешёвую модель для простых задач или более мощную модель для сложных."
    review_link: ""

  - id: "q4"
    type: single_choice
    prompt: "Что делает поле 'tools:' в определении пользовательского суб-агента?"
    points: 1
    options:
      - "Устанавливает новые CLI-инструменты в системе"
      - "Ограничивает набор инструментов, которые суб-агент может использовать"
      - "Перечисляет npm-пакеты, от которых зависит суб-агент"
      - "Определяет горячие клавиши для суб-агента"
    correct_answer: 1
    explanation: "Поле 'tools:' ограничивает набор инструментов, доступных суб-агенту. Например, можно ограничить исследовательского суб-агента только инструментами для чтения."
    review_link: ""

  - id: "q5"
    type: true_false
    prompt: "Изоляция через worktree позволяет суб-агенту работать в отдельной Git-ветке, не мешая вашей текущей рабочей директории."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 0
    explanation: "Изоляция через Git worktree даёт суб-агенту собственную рабочую директорию в отдельной ветке, чтобы его изменения файлов не конфликтовали с работой основного агента или вашей."
    review_link: ""

  - id: "q6"
    type: single_choice
    prompt: "Зачем назначать менее дорогую модель суб-агенту, выполняющему простую задачу?"
    points: 1
    options:
      - "Более дешёвые модели всегда быстрее и точнее"
      - "Чтобы снизить затраты на API без ущерба качеству при выполнении простой работы"
      - "Дорогие модели нельзя использовать как суб-агенты"
      - "Суб-агенты обязаны использовать модель, отличную от родительской"
    correct_answer: 1
    explanation: "Использование менее дорогой модели для простых подзадач (таких как поиск по файлам или форматирование) экономит затраты на API, пока родительский агент или другие суб-агенты обрабатывают сложные рассуждения с более мощной моделью."
    review_link: ""

  - id: "q7"
    type: scenario_best_action
    prompt: "Вам нужно, чтобы Claude Code рефакторил модуль и одновременно писал тесты для другого модуля, без возникновения конфликтов слияния. Какой лучший подход?"
    points: 2
    options:
      - "Попросить Claude сначала сделать рефакторинг, затем тесты последовательно"
      - "Вручную открыть две отдельные сессии Claude Code"
      - "Использовать суб-агенты с изоляцией через worktree, чтобы каждая задача работала в своей ветке параллельно"
      - "Скопировать весь репозиторий во вторую директорию и работать в обеих"
    correct_answer: 2
    explanation: "Суб-агенты с изоляцией через worktree — это специально созданное решение. Каждый суб-агент получает собственный Git worktree и ветку, что позволяет параллельную работу без конфликтов, а результаты можно объединить обратно."
    review_link: ""
