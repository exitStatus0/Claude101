questions:
  - id: "q1"
    type: single_choice
    prompt: "Что означает MCP в контексте Claude Code?"
    points: 1
    options:
      - "Multi-Channel Protocol"
      - "Model Context Protocol"
      - "Managed Cloud Platform"
      - "Message Communication Pipeline"
    correct_answer: 1
    explanation: "MCP расшифровывается как Model Context Protocol. Это открытый стандарт для подключения ИИ-моделей к внешним источникам данных и инструментам."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Какой файл в репозитории проекта определяет MCP-серверы, доступные всем участникам?"
    points: 1
    options:
      - "~/.claude.json"
      - ".claude/settings.json"
      - ".mcp.json"
      - "mcp-config.yml"
    correct_answer: 2
    explanation: ".mcp.json в корне проекта определяет конфигурации MCP-серверов, которые коммитятся в репозиторий и доступны всем участникам."
    review_link: ""

  - id: "q3"
    type: short_answer
    prompt: "Какая CLI-команда добавляет MCP-сервер в ваш проект в Claude Code?"
    points: 1
    accepted_answers:
      - "claude mcp add"
      - "/mcp add"
    explanation: "Команда 'claude mcp add' (или слэш-команда '/mcp add' внутри сессии) регистрирует новый MCP-сервер для вашего проекта."
    review_link: ""

  - id: "q4"
    type: true_false
    prompt: "Файл ~/.claude.json хранит конфигурации MCP-серверов на уровне пользователя, которые применяются ко всем проектам."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 0
    explanation: "~/.claude.json — это конфигурационный файл уровня пользователя. MCP-серверы, определённые здесь, доступны в каждом проекте, который вы открываете с Claude Code, в отличие от .mcp.json, который привязан к проекту."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Какой тип транспорта обычно использует MCP-сервер GitHub?"
    points: 1
    options:
      - "http"
      - "stdio"
      - "websocket"
      - "grpc"
    correct_answer: 1
    explanation: "MCP-сервер GitHub (и большинство локальных MCP-серверов) использует транспорт stdio, обмениваясь данными через стандартный ввод/вывод с MCP-процессом."
    review_link: ""

  - id: "q6"
    type: multi_select
    prompt: "Какие из следующих утверждений верны относительно разрешений MCP в Claude Code? (Выберите все подходящие.)"
    points: 1
    options:
      - "MCP-инструменты требуют одобрения пользователя при первом использовании по умолчанию"
      - "Вы можете добавить конкретные MCP-инструменты в список разрешённых в settings.json"
      - "MCP-серверы всегда имеют неограниченный доступ к вашей файловой системе"
      - "MCP-серверы из .mcp.json на уровне проекта должны быть одобрены (trusted) перед запуском их инструментов"
    correct_answer: [0, 1, 3]
    explanation: "MCP-инструменты следуют той же модели разрешений, что и встроенные инструменты: они требуют одобрения при первом использовании, могут быть добавлены в список разрешённых, а серверы из .mcp.json на уровне проекта должны быть одобрены. MCP-серверы НЕ получают автоматически неограниченный доступ к файловой системе."
    review_link: ""

  - id: "q7"
    type: scenario_best_action
    prompt: "Ваша команда хочет, чтобы каждый разработчик имел доступ к внутреннему MCP-серверу базы знаний компании при работе в монорепозитории. Какой лучший подход к настройке?"
    points: 2
    options:
      - "Попросить каждого разработчика вручную добавить его в свой ~/.claude.json"
      - "Добавить конфигурацию MCP-сервера в .mcp.json в корне репозитория и закоммитить"
      - "Создать хук, который запускает MCP-сервер при старте сессии"
      - "Описать шаги настройки в README и надеяться, что все их выполнят"
    correct_answer: 1
    explanation: "Добавление MCP-сервера в .mcp.json в корне репозитория гарантирует, что каждый участник, клонирующий репозиторий, автоматически получит конфигурацию. В этом назначение файла .mcp.json на уровне проекта."
    review_link: ""

  - id: "q8"
    type: single_choice
    prompt: "Что происходит, когда Claude Code впервые встречает MCP-сервер, определённый в .mcp.json?"
    points: 1
    options:
      - "Подключается автоматически без каких-либо запросов"
      - "Спрашивает пользователя, доверяет ли он MCP-серверу, перед подключением"
      - "Отказывается подключаться, если сервер не указан также в ~/.claude.json"
      - "Запускает сервер в изолированном контейнере"
    correct_answer: 1
    explanation: "В целях безопасности Claude Code запрашивает у пользователя подтверждение доверия к MCP-серверам из .mcp.json на уровне проекта перед подключением, поскольку они могли быть добавлены кем угодно с правами на коммит."
    review_link: ""
