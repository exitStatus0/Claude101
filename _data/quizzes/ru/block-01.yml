questions:
  - id: "q1"
    type: single_choice
    prompt: "Что генерирует команда `/init` в Claude Code?"
    points: 1
    options:
      - "Dockerfile для проекта"
      - "Файл CLAUDE.md, который фиксирует структуру проекта, технологический стек и соглашения"
      - "Файл .gitignore на основе обнаруженного языка"
      - "Конфигурацию CI/CD-пайплайна"
    correct_answer: 1
    explanation: "`/init` анализирует всю вашу кодовую базу и генерирует файл CLAUDE.md — машиночитаемое руководство по проекту, которое Claude загружает в начале каждой сессии. Считайте его документом для онбординга Claude."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Какова связь между README.md и CLAUDE.md?"
    points: 1
    options:
      - "Это один и тот же файл с разными именами"
      - "README.md — для людей, присоединяющихся к команде; CLAUDE.md — для Claude, присоединяющегося к команде"
      - "CLAUDE.md заменяет README.md в AI-first проектах"
      - "README.md загружается Claude; CLAUDE.md — для справки людей"
    correct_answer: 1
    explanation: "README.md написан для разработчиков-людей. CLAUDE.md написан для Claude Code — он фиксирует соглашения, подводные камни и «племенные знания» в формате, который Claude автоматически читает при старте сессии."
    review_link: ""

  - id: "q3"
    type: multi_select
    prompt: "Какие инструменты Claude Code использует «за кулисами» для исследования кодовой базы? (Выберите все подходящие)"
    points: 2
    options:
      - "Read — открывает и читает конкретный файл"
      - "Grep — ищет паттерны по файлам"
      - "Glob — находит файлы по шаблону имени"
      - "Compile — собирает проект для проверки ошибок"
    correct_answer: [0, 1, 2]
    explanation: "Claude использует три инструмента для исследования: Read (аналог `cat`), Grep (аналог `rg`) и Glob (аналог `find`). Инструмента Compile не существует — Claude использует инструмент Bash для запуска команд сборки при необходимости."
    review_link: ""

  - id: "q4"
    type: single_choice
    prompt: "Когда вы спрашиваете Claude «как работает переключение тем?», что Claude делает внутри?"
    points: 1
    options:
      - "Ищет паттерны переключения тем в своих обучающих данных"
      - "Использует Grep для поиска кода, связанного с темами, Read для изучения файлов и Glob для поиска конфигурационных файлов"
      - "Просит вас указать на нужный файл"
      - "Запускает приложение и проверяет интерфейс"
    correct_answer: 1
    explanation: "Claude основывает свои ответы на вашем реальном коде. Он использует Grep для поиска упоминаний тем, Read для изучения этих файлов и Glob для обнаружения связанных конфигураций. Он не полагается только на обучающие данные."
    review_link: ""

  - id: "q5"
    type: true_false
    prompt: "После запуска `/init` не следует редактировать сгенерированный CLAUDE.md — Claude поддерживает его в актуальном состоянии автоматически."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 1
    explanation: "Неверно. Автоматически сгенерированный CLAUDE.md — это хорошая отправная точка, но со временем его нужно редактировать, добавляя командные соглашения, подводные камни и специфичные для проекта паттерны, которые `/init` мог не уловить."
    review_link: ""

  - id: "q6"
    type: scenario_best_action
    prompt: "Вы только что присоединились к новой команде и склонировали репозиторий с 80+ файлами и без документации. Вы хотите быстро разобраться в архитектуре. Какой лучший подход с Claude Code?"
    points: 2
    options:
      - "Читать каждый файл по одному с помощью инструмента Read"
      - "Запустить `/init` для генерации CLAUDE.md, затем в диалоге попросить Claude объяснить архитектуру, поток данных и ключевые паттерны"
      - "Попросить Claude переписать проект на языке, который вы знаете лучше"
      - "Пропустить исследование и сразу начать вносить изменения — разберётесь по ходу"
    correct_answer: 1
    explanation: "Запуск `/init` даёт Claude (и вам) обзор проекта. Затем исследование через диалог — вопросы об архитектуре, потоке данных и проектных решениях — позволяет Claude читать код и давать обоснованные ответы. Это намного быстрее, чем читать файлы по одному."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Какой инструмент Claude Code наиболее аналогичен запуску `rg 'pattern'` в терминале?"
    points: 1
    options:
      - "Read"
      - "Glob"
      - "Grep"
      - "Bash"
    correct_answer: 2
    explanation: "Инструмент Grep ищет паттерны по файлам, как `rg` (ripgrep). Read аналогичен `cat`, а Glob аналогичен `find`."
    review_link: ""
