questions:
  - id: "q1"
    type: single_choice
    prompt: "Как Claude Code выполняет команды оболочки на вашей машине?"
    points: 1
    options:
      - "Подключается к вашей машине по SSH с удалённого сервера"
      - "Через инструмент Bash, который запускает команды в вашем терминале с вашего разрешения"
      - "Записывает скрипты на диск и просит вас запустить их вручную"
      - "Команды выполняются в изолированном Docker-контейнере"
    correct_answer: 1
    explanation: "Claude Code использует инструмент Bash для выполнения команд оболочки прямо в вашем терминале. Перед запуском команды он показывает, что хочет выполнить, и запрашивает ваше разрешение."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "В чём ключевое различие между `/clear` и `/compact`?"
    points: 1
    options:
      - "`/clear` сжимает диалог; `/compact` удаляет его"
      - "`/clear` стирает весь диалог; `/compact` суммаризирует его для освобождения контекста"
      - "Они делают одно и то же, но `/compact` быстрее"
      - "`/clear` удаляет только вывод инструментов; `/compact` удаляет всё"
    correct_answer: 1
    explanation: "`/clear` — это ядерный вариант: стирает всё и начинает с нуля. `/compact` умнее: Claude суммаризирует диалог в сжатую форму, сохраняя ключевую информацию и освобождая контекст. Представьте `/clear` как закрытие всех вкладок браузера, а `/compact` — как сохранение важных в закладки."
    review_link: ""

  - id: "q3"
    type: true_false
    prompt: "Когда Claude Code хочет запустить `npm install`, он выполняет команду немедленно, не спрашивая вас."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 1
    explanation: "Неверно. Модель разрешений Claude Code требует вашего одобрения перед выполнением команд оболочки. Вы увидите запрос вроде «Allow? (y/n)» перед запуском чего-либо. Это обеспечивает ваш полный контроль."
    review_link: ""

  - id: "q4"
    type: scenario_best_action
    prompt: "Вы в длительной сессии Claude Code — запустили npm install, подняли dev-сервер, исправили две ошибки линтера и собрали Docker-образ. Ответы Claude становятся медленнее и менее точными. Что делать?"
    points: 2
    options:
      - "Закрыть терминал и перезапустить Claude Code с нуля"
      - "Использовать `/compact` для суммаризации диалога и освобождения контекста"
      - "Использовать `/clear`, чтобы стереть всё и заново объяснить, что вы делали"
      - "Продолжать — Claude сам управляет своим контекстом"
    correct_answer: 1
    explanation: "`/compact` идеально подходит здесь. Вы глубоко в сессии и хотите продолжить, но контекстное окно заполняется. `/compact` суммаризирует произошедшее, освобождая место и сохраняя ключевую информацию. `/clear` потеряет весь контекст, и вам придётся объяснять всё заново."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Во время сессии Claude Code вы намеренно вносите синтаксическую ошибку в файл и просите Claude запустить тесты. Что произойдёт?"
    points: 1
    options:
      - "Claude откажется запускать тесты, потому что обнаружит ошибку"
      - "Claude запустит тесты, прочитает вывод ошибки, диагностирует проблему и предложит исправление"
      - "Claude автоматически исправит ошибку перед запуском тестов"
      - "Команда тестов упадёт, и Claude завершит сессию"
    correct_answer: 1
    explanation: "Claude запускает тесты по запросу, видит вывод ошибки, анализирует сообщения об ошибках, а затем диагностирует и предлагает исправление. Это цикл «сломай и почини», который делает Claude мощным инструментом отладки — он читает реальный вывод ошибок, а не угадывает."
    review_link: ""

  - id: "q6"
    type: multi_select
    prompt: "Что из перечисленного Claude Code может делать через инструмент Bash? (Выберите все подходящие)"
    points: 2
    options:
      - "Запустить `npm install` для установки зависимостей"
      - "Поднять dev-сервер с помощью `npm run dev`"
      - "Собрать Docker-образ с помощью `docker build`"
      - "Развернуть прямо в продакшн Kubernetes-кластер без подтверждения"
    correct_answer: [0, 1, 2]
    explanation: "Инструмент Bash может запускать любые команды оболочки — npm, docker, kubectl и т.д. Однако каждая команда требует вашего разрешения перед выполнением. Claude не может развернуть в продакшн (или запустить любую команду) без вашего явного одобрения."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Когда лучше использовать `/clear` вместо `/compact`?"
    points: 1
    options:
      - "Когда ответы становятся медленными"
      - "Когда вы переключаетесь на совершенно другую задачу, не связанную с текущим диалогом"
      - "В конце каждой сессии как шаг очистки"
      - "После каждой сборки Docker"
    correct_answer: 1
    explanation: "`/clear` лучше всего использовать при переключении на совершенно другую задачу. Поскольку он стирает весь контекст, вы начинаете с чистого листа — что и нужно, когда предыдущий диалог больше не релевантен. `/compact` лучше, когда вы хотите продолжить текущую работу."
    review_link: ""
