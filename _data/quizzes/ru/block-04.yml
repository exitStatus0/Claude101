questions:
  - id: "q1"
    type: single_choice
    prompt: "В чём ключевое различие между инструментами Edit и Write в Claude Code?"
    points: 1
    options:
      - "Edit быстрее; Write точнее"
      - "Edit выполняет точечные замены строк в существующих файлах; Write создаёт или полностью перезаписывает файл"
      - "Edit работает только с файлами кода; Write работает с любым типом файлов"
      - "Различий нет — это псевдонимы одной операции"
    correct_answer: 1
    explanation: "Инструмент Edit выполняет хирургические замены — находит точную строку в файле и заменяет её, оставляя всё остальное нетронутым. Инструмент Write создаёт новые файлы или полностью перезаписывает существующие. Используйте Edit для точечных изменений, Write — для новых файлов."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "При реализации тёмной темы Claude добавляет CSS-переменные в `[data-theme='dark']`. Какой инструмент он для этого использует?"
    points: 1
    options:
      - "Инструмент Write — он перезаписывает весь CSS-файл"
      - "Инструмент Edit — он находит нужную секцию CSS и точно вставляет новый блок"
      - "Инструмент Bash — он запускает команду sed"
      - "Инструмент Grep — он заменяет совпадения на месте"
    correct_answer: 1
    explanation: "Инструмент Edit идеально подходит для этого. Он находит точное место в CSS-файле и добавляет блок тёмной темы. Никаких угадываний с регулярными выражениями, никаких случайных изменений в других частях файла — хирургическая точность."
    review_link: ""

  - id: "q3"
    type: scenario_best_action
    prompt: "Вы попросили Claude реализовать тёмную тему. Dev-сервер работает, и вы видите результат в браузере. Фон сайдбара слишком светлый — вы хотите темнее. Какой самый эффективный подход?"
    points: 2
    options:
      - "Найти CSS-файл, вручную изменить hex-код и обновить браузер"
      - "Сказать Claude на обычном языке: «сделай сайдбар темнее» — и позволить ему найти и изменить нужное CSS-значение"
      - "Использовать `/clear` и начать всю реализацию темы заново"
      - "Написать подробную техническую спецификацию с точным hex-значением"
    correct_answer: 1
    explanation: "Это итеративная доработка в действии. Вы описываете, чего хотите, на обычном языке, и Claude находит нужный файл, определяет нужное значение и вносит изменение. Это намного быстрее, чем самому искать по CSS-файлам, и это один из сильнейших рабочих процессов Claude Code."
    review_link: ""

  - id: "q4"
    type: true_false
    prompt: "Claude Code может добавлять файлы в staging, писать сообщения коммитов и создавать git-коммиты — всё без выхода из терминальной сессии."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 0
    explanation: "Верно. Claude Code полностью интегрирован с git через инструмент Bash. Он может выполнить `git add`, написать осмысленное сообщение коммита на основе изменений и выполнить `git commit` — всё в той же сессии, где вы вносили изменения."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "После того как Claude реализовал тёмную тему, что следует сделать перед коммитом?"
    points: 1
    options:
      - "Закоммитить немедленно — скорость — это всё"
      - "Запустить тесты через Claude, чтобы отловить регрессии"
      - "Удалить файл CLAUDE.md, чтобы он не мешал"
      - "Вручную проверить каждую строку кода, написанного Claude"
    correct_answer: 1
    explanation: "Запуск тестов перед коммитом критичен. Claude Code может запустить ваши тесты и линтер, чтобы убедиться, что изменения темы ничего не сломали. Это часть здорового рабочего процесса: реализовать, протестировать, затем закоммитить."
    review_link: ""

  - id: "q6"
    type: multi_select
    prompt: "Какие компоненты системы тем ai-coderrank затрагиваются при реализации тёмной темы? (Выберите все подходящие)"
    points: 2
    options:
      - "tailwind.config.ts — определяет цветовую палитру и стратегию тёмного режима"
      - "Глобальные CSS-переменные — объявляют --background, --foreground, --accent и т.д."
      - "ThemeProvider — React-контекст, управляющий состоянием light/dark"
      - "package.json — добавляет новую зависимость для тёмной темы"
    correct_answer: [0, 1, 2]
    explanation: "Реализация тёмной темы затрагивает Tailwind-конфиг, CSS-переменные и ThemeProvider. Новые npm-пакеты не нужны — существующая архитектура уже поддерживает темизацию через CSS-переменные и контекст-провайдер."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Почему инструмент Edit описывается как «хирургический» по сравнению с ручным редактированием файлов?"
    points: 1
    options:
      - "Он использует продвинутый ИИ для предсказания того, что вы хотите изменить"
      - "Он указывает точную строку для поиска и точную замену — без регулярных выражений, без случайных изменений в других файлах"
      - "Он блокирует файл, чтобы другие процессы не могли его одновременно изменять"
      - "Он автоматически создаёт резервную копию перед каждым изменением"
    correct_answer: 1
    explanation: "Инструмент Edit работает по точному совпадению строк — находит конкретную строку в файле и заменяет её другой. Это означает отсутствие ошибок регулярных выражений, отсутствие случайных изменений не в той строке, и изменения ограничены ровно тем, что было указано."
    review_link: ""
