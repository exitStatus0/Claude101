questions:
  - id: "q1"
    type: single_choice
    prompt: "Как активировать режим Plan в Claude Code?"
    points: 1
    options:
      - "Набрать `/plan` или нажать Shift+Tab перед отправкой сообщения"
      - "Добавить слово «plan» в любом месте промпта"
      - "Claude всегда планирует автоматически перед внесением изменений"
      - "Запустить `claude --plan` при старте сессии"
    correct_answer: 0
    explanation: "Режим Plan активируется вводом `/plan` или нажатием Shift+Tab. Это переключает Claude из режима «исполнителя» в режим «мыслителя» — он изложит план действий и получит ваше одобрение, прежде чем трогать файлы."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Что такое Architecture Decision Record (ADR)?"
    points: 1
    options:
      - "Полный проектный документ, охватывающий все аспекты системы"
      - "Короткий, выраженный документ, фиксирующий конкретное техническое решение и его обоснование"
      - "Запись в changelog, автоматически генерируемая CI/CD"
      - "Комментарий в коде, объясняющий сложную функцию"
    correct_answer: 1
    explanation: "ADR — это легковесный документ, отвечающий на один ключевой вопрос: «почему мы приняли это решение?» В отличие от проектных документов, ADR короткие, выраженные и сфокусированы на одном решении — что делает их действительно полезными для будущих разработчиков."
    review_link: ""

  - id: "q3"
    type: true_false
    prompt: "Mermaid-диаграммы — это файлы изображений, которые нужно переэкспортировать каждый раз при обновлении."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 1
    explanation: "Неверно. Mermaid-диаграммы текстовые и написаны в Markdown. GitHub рендерит их нативно, они хранятся в системе контроля версий и удобны для diff. Вы редактируете текст, а не изображения — шаг экспорта не нужен."
    review_link: ""

  - id: "q4"
    type: scenario_best_action
    prompt: "Ваш тимлид просит реализовать тёмную тему для всего приложения. Это затронет Tailwind-конфиг, CSS-переменные, ThemeProvider и множество компонентов. Какой лучший подход с Claude Code?"
    points: 2
    options:
      - "Начать кодить немедленно — Claude достаточно быстр, чтобы исправлять ошибки на ходу"
      - "Использовать режим Plan, чтобы Claude обозначил каждый файл и изменение, создать ADR с документацией решения, затем рассмотреть план перед реализацией"
      - "Попросить Claude сгенерировать только ADR и реализовать тему вручную"
      - "Создать новую ветку и позволить Claude менять файлы наугад, пока не будет выглядеть правильно"
    correct_answer: 1
    explanation: "Для изменений в нескольких файлах планирование критично. Режим Plan позволяет Claude спланировать каждый файл и каждое изменение. ADR документирует «почему» для будущей справки. Только после рассмотрения и одобрения плана следует переходить к реализации (Блок 4). Это предотвращает антипаттерн «изменил 47 файлов и не помню зачем»."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Что происходит, когда Claude находится в режиме Plan?"
    points: 1
    options:
      - "Он читает код, но не может записывать файлы или запускать команды"
      - "Он описывает план действий: какие файлы изменит и как — и ждёт вашего одобрения перед действием"
      - "Он автоматически создаёт pull request с предложенными изменениями"
      - "Он запускает изменения в песочнице для предварительного просмотра"
    correct_answer: 1
    explanation: "В режиме Plan Claude продумывает проблему и показывает вам структурированный план: какие файлы изменить, какие изменения внести и в каком порядке. Он не выполняет ничего, пока вы не рассмотрите и одобрите план."
    review_link: ""

  - id: "q6"
    type: multi_select
    prompt: "Какие из перечисленных причин использования Mermaid-диаграмм в проекте являются обоснованными? (Выберите все подходящие)"
    points: 2
    options:
      - "Они хранятся в системе контроля версий вместе с вашим кодом"
      - "GitHub рендерит их нативно в Markdown-файлах"
      - "Они создают изображения более высокого качества, чем специализированные инструменты для диаграмм"
      - "Они удобны для diff — можно видеть, что изменилось, при ревью PR"
    correct_answer: [0, 1, 3]
    explanation: "Mermaid-диаграммы текстовые, хранятся в контроле версий, удобны для diff, и GitHub рендерит их нативно. Они могут не давать изображения наивысшего качества по сравнению с инструментами вроде Figma, но их преимущества для рабочего процесса разработчика значительны."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Какие четыре документационных файла создаются в Блоке 3 учебного проекта?"
    points: 1
    options:
      - "README.md, CONTRIBUTING.md, CHANGELOG.md, LICENSE"
      - "docs/adr/001-dark-theme.md, docs/diagrams/infrastructure.md, docs/diagrams/traffic-flow.md, docs/diagrams/deployment-pipeline.md"
      - "CLAUDE.md, .claude/rules/theme.md, docs/theme-spec.md, tests/theme.test.md"
      - "plan.md, review.md, approve.md, implement.md"
    correct_answer: 1
    explanation: "В Блоке 3 создаётся ADR для решения о тёмной теме и три Mermaid-диаграммы: топология инфраструктуры (DO + k3s), поток трафика (маршрутизация запросов) и пайплайн развёртывания (CI/CD). Это артефакты, которые senior-инженер создал бы перед крупным изменением."
    review_link: ""

  - id: "q8"
    type: short_answer
    prompt: "Какое сочетание клавиш переключает режим Plan в Claude Code?"
    points: 1
    accepted_answers:
      - "Shift+Tab"
      - "shift+tab"
      - "Shift + Tab"
      - "shift + tab"
    explanation: "Нажатие Shift+Tab переключает между режимом Plan (размышление) и обычным режимом (выполнение). Также можно использовать слэш-команду `/plan`."
    review_link: ""
