questions:
  - id: "q1"
    type: single_choice
    prompt: "Что такое GitOps?"
    points: 1
    options:
      - "Сервис хостинга Git, аналогичный GitHub"
      - "Операционная модель, где Git является единственным источником истины для декларативной инфраструктуры и приложений"
      - "Git GUI-клиент для DevOps-команд"
      - "Стратегия ветвления для монорепозиториев"
    correct_answer: 1
    explanation: "GitOps — это операционная модель, использующая Git-репозитории как единственный источник истины. Изменения в инфраструктуре и приложениях вносятся через Git-коммиты, а автоматический агент приводит текущее состояние в соответствие."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Что такое «sync loop» в ArgoCD?"
    points: 1
    options:
      - "CI/CD-пайплайн, запускающийся при каждом push"
      - "Непрерывный процесс согласования, сравнивающий желаемое состояние в Git с текущим состоянием кластера и исправляющий расхождения"
      - "Cron-задача для резервного копирования Git-репозитория"
      - "Вебхук, уведомляющий Slack о завершении развёртывания"
    correct_answer: 1
    explanation: "Sync loop ArgoCD непрерывно сравнивает объявленное состояние в Git-репозитории с фактическим состоянием в Kubernetes-кластере. При обнаружении расхождения он синхронизирует текущее состояние для соответствия Git."
    review_link: ""

  - id: "q3"
    type: short_answer
    prompt: "В лабораторной среде курса веб-интерфейс ArgoCD доступен на каком NodePort?"
    points: 1
    accepted_answers:
      - "30080"
      - "NodePort 30080"
      - "port 30080"
    explanation: "В лабораторной среде курса веб-интерфейс ArgoCD доступен на NodePort 30080, что делает его доступным по IP-адресу ноды на этом порту."
    review_link: ""

  - id: "q4"
    type: true_false
    prompt: "Self-healing в ArgoCD означает, что если кто-то вручную изменит ресурс в кластере, ArgoCD автоматически вернёт его к состоянию, объявленному в Git."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 0
    explanation: "При включённом self-healing ArgoCD обнаруживает ручные изменения (дрифт) в кластере и автоматически откатывает их к желаемому состоянию, объявленному в Git. Это обеспечивает Git как единственный источник истины."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Как команда /loop в Claude Code может быть полезна в GitOps-процессе?"
    points: 1
    options:
      - "Она создаёт бесконечные Git-ветки"
      - "Она периодически опрашивает и мониторит ресурсы, например проверяет статус синхронизации ArgoCD с заданным интервалом"
      - "Она перебирает все файлы в репозитории и линтит их"
      - "Она перезапускает Kubernetes-кластер в цикле, пока он не станет здоровым"
    correct_answer: 1
    explanation: "Команда /loop запускает промпт или задачу с повторяющимся интервалом, что полезно для мониторинга статуса синхронизации ArgoCD, наблюдения за здоровьем подов или отслеживания прогресса развёртывания."
    review_link: ""

  - id: "q6"
    type: single_choice
    prompt: "Что позволяет делать команда /schedule в Claude Code?"
    points: 1
    options:
      - "Планировать встречи с командой"
      - "Создавать удалённых агентов на основе cron, которые выполняют задачи по расписанию"
      - "Устанавливать таймер для текущей сессии кодирования"
      - "Планировать Git-коммиты на будущую дату"
    correct_answer: 1
    explanation: "Команда /schedule создаёт запланированных удалённых агентов (триггеры), которые выполняются по cron-расписанию, позволяя автоматизировать повторяющиеся задачи, такие как ежедневные код-ревью или периодическое обслуживание."
    review_link: ""

  - id: "q7"
    type: scenario_best_action
    prompt: "Вы отправили изменение Kubernetes-манифеста в Git, но ArgoCD показывает приложение как 'OutOfSync', и синхронизация завершается ошибкой. Что делать в первую очередь?"
    points: 2
    options:
      - "Удалить приложение ArgoCD и создать его заново с нуля"
      - "Проверить детали ошибки синхронизации ArgoCD и diff между желаемым и текущим состоянием, чтобы понять причину сбоя"
      - "Немедленно откатить Git-коммит без расследования"
      - "Перезапустить поды сервера ArgoCD"
    correct_answer: 1
    explanation: "Первый шаг — всегда расследование. ArgoCD предоставляет подробные сообщения об ошибках синхронизации и представление diff, показывающее точные различия между Git (желаемое) и кластером (текущее). Эта информация направляет исправление."
    review_link: ""

  - id: "q8"
    type: multi_select
    prompt: "Какие из следующих преимуществ даёт модель GitOps? (Выберите все подходящие.)"
    points: 1
    options:
      - "Полный аудиторский след каждого изменения через историю Git"
      - "Лёгкий откат путём отката Git-коммита"
      - "Устраняет необходимость в мониторинге и алертах"
      - "Самовосстановление при дрифте конфигурации"
    correct_answer: [0, 1, 3]
    explanation: "GitOps обеспечивает аудиторский след, лёгкий откат и самовосстановление. Однако он НЕ устраняет необходимость в мониторинге и алертах, которые остаются необходимыми."
    review_link: ""
