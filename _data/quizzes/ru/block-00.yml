questions:
  - id: "q1"
    type: single_choice
    prompt: "Какой рекомендуемый способ установки Claude Code?"
    points: 1
    options:
      - "Нативный установщик (curl -fsSL https://claude.ai/install.sh | bash)"
      - "pip install claude-code"
      - "Скачать из App Store"
      - "Он предустановлен вместе с Node.js"
    correct_answer: 0
    explanation: "Рекомендуемый способ — нативный установщик. Также поддерживаются Homebrew и WinGet. npm — альтернативный, но не основной метод."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Что происходит при первом запуске команды `claude` после установки?"
    points: 1
    options:
      - "Модель ИИ скачивается на вашу машину"
      - "Открывается окно браузера для аутентификации через аккаунт Anthropic"
      - "Сканируется вся файловая система в поисках проектов с кодом"
      - "Автоматически создаётся файл CLAUDE.md"
    correct_answer: 1
    explanation: "При первом запуске Claude Code открывает аутентификацию через браузер, чтобы вы могли подключить свой аккаунт Anthropic. Модель работает на сервере — ничего не скачивается локально."
    review_link: ""

  - id: "q3"
    type: true_false
    prompt: "Claude Code — это расширение для IDE, которое работает только внутри VS Code."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 1
    explanation: "Неверно. Claude Code — это автономный агент, работающий в терминале. Он работает в любом терминале — macOS Terminal, iTerm2, терминалах Linux или даже во встроенном терминале VS Code. Это не расширение для IDE."
    review_link: ""

  - id: "q4"
    type: single_choice
    prompt: "Какой уровень подписки Anthropic включает доступ к Claude Code?"
    points: 1
    options:
      - "Бесплатный уровень"
      - "Pro ($20/месяц)"
      - "Только Enterprise"
      - "Только поминутная оплата через API"
    correct_answer: 1
    explanation: "Claude Code включён в подписку Anthropic Pro за $20/месяц. Для курса не нужна отдельная оплата через API или корпоративный контракт."
    review_link: ""

  - id: "q5"
    type: single_choice
    prompt: "Что показывает команда `/help` внутри сессии Claude Code?"
    points: 1
    options:
      - "Полную документацию API Anthropic"
      - "Список доступных слэш-команд, горячих клавиш и советов по использованию"
      - "Статистику биллинга и использования токенов"
      - "Пошаговое руководство по текущему проекту"
    correct_answer: 1
    explanation: "`/help` показывает доступные слэш-команды, горячие клавиши и советы по эффективному использованию Claude Code. Это ваша справочная карточка внутри сессии."
    review_link: ""

  - id: "q6"
    type: scenario_best_action
    prompt: "Вы только что установили Claude Code и впервые запускаете `claude` в директории нового проекта. Claude успешно аутентифицируется и открывает интерактивную сессию. Какое лучшее первое действие?"
    points: 2
    options:
      - "Немедленно попросить Claude рефакторить всю кодовую базу"
      - "Набрать /help, чтобы увидеть доступные команды, затем попросить Claude описать, что делает этот проект"
      - "Закрыть сессию и сначала вручную написать файл CLAUDE.md"
      - "Запустить /clear, чтобы убедиться, что контекст пуст"
    correct_answer: 1
    explanation: "Начав с `/help`, вы узнаете, что доступно, а затем попросив Claude описать проект, вы дадите ему изучить кодовую базу и предоставить обоснованное резюме. Бросаться в рефакторинг без понимания кода рискованно; `/clear` в свежей сессии не даёт ничего полезного."
    review_link: ""

  - id: "q7"
    type: single_choice
    prompt: "Какой учебный проект используется на протяжении всего курса Claude Code 101?"
    points: 1
    options:
      - "Приложение списка задач на Express.js"
      - "ai-coderrank — дашборд на Next.js для сравнения ИИ-моделей для кодирования"
      - "Kubernetes-оператор на Go"
      - "Статический блог на Jekyll"
    correct_answer: 1
    explanation: "Учебный проект курса — ai-coderrank, дашборд на Next.js 14 для сравнения ИИ-моделей по производительности и цене. Он включает React, TypeScript, Docker, K8s-манифесты и CI/CD — реалистичный full-stack проект."
    review_link: ""
