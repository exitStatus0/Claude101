questions:
  - id: "q1"
    type: single_choice
    prompt: "Что означает «headless-режим» при запуске Claude Code с 'claude -p'?"
    points: 1
    options:
      - "Claude работает без языковой модели и использует только локальные инструменты"
      - "Claude работает неинтерактивно, обрабатывая один промпт и возвращая результат без TUI-сессии"
      - "Claude работает с упрощённым интерфейсом, скрывающим все вызовы инструментов"
      - "Claude работает без доступа в интернет"
    correct_answer: 1
    explanation: "Headless-режим (claude -p) запускает Claude неинтерактивно. Вы передаёте промпт, он обрабатывает его, выводит результат и завершается. Интерактивная TUI-сессия не запускается."
    review_link: ""

  - id: "q2"
    type: single_choice
    prompt: "Что делает флаг --output-format json при использовании с 'claude -p'?"
    points: 1
    options:
      - "Заставляет Claude генерировать только JSON-код в ответе"
      - "Сохраняет историю диалога в JSON-файл"
      - "Выводит полный результат как структурированный JSON, удобный для программной обработки"
      - "Конвертирует исходные файлы проекта в формат JSON"
    correct_answer: 2
    explanation: "Флаг --output-format json заставляет Claude выводить ответ в виде структурированного JSON, что идеально для передачи в другие инструменты или скрипты для программной обработки."
    review_link: ""

  - id: "q3"
    type: single_choice
    prompt: "Каково назначение команды /batch в Claude Code?"
    points: 1
    options:
      - "Пакетное переименование файлов в проекте"
      - "Запуск одного и того же промпта для нескольких файлов или контекстов параллельно"
      - "Пакетная отправка API-запросов для снижения затрат"
      - "Сжатие нескольких Git-коммитов в один"
    correct_answer: 1
    explanation: "Команда /batch позволяет запускать один и тот же промпт или задачу для нескольких файлов, директорий или контекстов параллельно, значительно ускоряя повторяющиеся операции."
    review_link: ""

  - id: "q4"
    type: true_false
    prompt: "Вывод 'claude -p' с --output-format json можно передать напрямую в jq для дальнейшей обработки."
    points: 1
    options:
      - "Верно"
      - "Неверно"
    correct_answer: 0
    explanation: "Поскольку --output-format json выдаёт валидный JSON на stdout, его можно передать напрямую в jq или любой другой инструмент обработки JSON через конвейер оболочки."
    review_link: ""

  - id: "q5"
    type: multi_select
    prompt: "Какие из следующих являются допустимыми сценариями использования команд агентов (нескольких агентов Claude, работающих вместе)? (Выберите все подходящие.)"
    points: 1
    options:
      - "Один агент пишет код, другой проверяет его"
      - "Параллельная миграция нескольких микросервисов"
      - "Агент-оркестратор делегирует подзадачи специализированным агентам"
      - "Полная замена всех человеческих разработчиков в команде"
    correct_answer: [0, 1, 2]
    explanation: "Команды агентов отлично справляются с разделением работы: написание/ревью, параллельные миграции и оркестрированное делегирование подзадач. Они дополняют разработчиков-людей, а не заменяют их."
    review_link: ""

  - id: "q6"
    type: single_choice
    prompt: "При создании конвейера оболочки с Claude в headless-режиме какая комбинация позволяет передать промпт и получить машиночитаемый вывод?"
    points: 1
    options:
      - "claude --interactive --format json"
      - "claude -p \"your prompt\" --output-format json"
      - "claude --batch --json-output"
      - "claude run --prompt \"your prompt\" --json"
    correct_answer: 1
    explanation: "Правильный синтаксис — 'claude -p \"your prompt\" --output-format json'. Флаг -p включает headless-режим, а --output-format json выдаёт структурированный JSON-вывод."
    review_link: ""

  - id: "q7"
    type: scenario_best_action
    prompt: "Вам нужно добавить заголовки лицензии в 200 исходных файлов проекта. Какой самый эффективный подход с Claude Code?"
    points: 2
    options:
      - "Открыть интерактивную сессию и попросить Claude редактировать каждый файл по одному"
      - "Использовать /batch для запуска промпта вставки заголовка лицензии для всех 200 файлов параллельно"
      - "Вручную написать sed-скрипт вместо использования Claude"
      - "Использовать headless-режим в цикле for: 'for f in *.js; do claude -p \"add header to $f\"; done'"
    correct_answer: 1
    explanation: "/batch создан специально для запуска одной и той же операции для множества файлов параллельно. Это эффективнее последовательного цикла for и масштабнее, чем интерактивная обработка по одному."
    review_link: ""

  - id: "q8"
    type: single_choice
    prompt: "Из чего в основном состоит экосистема Claude Code?"
    points: 1
    options:
      - "Только CLI-инструмент и ничего больше"
      - "CLI, GitHub Action, MCP-серверы, хуки, суб-агенты и headless/batch-режимы, формирующие расширяемую платформу"
      - "Набор расширений для VS Code"
      - "Веб-IDE со встроенным развёртыванием"
    correct_answer: 1
    explanation: "Экосистема Claude Code включает интерактивный CLI, GitHub Action для CI, протокол MCP для внешних инструментов, хуки для автоматизации жизненного цикла, суб-агенты для параллельной работы и headless/batch-режимы для скриптинга — всё это формирует компонуемую платформу."
    review_link: ""
