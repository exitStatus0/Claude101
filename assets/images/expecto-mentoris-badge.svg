<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1120" role="img" aria-labelledby="title desc">
  <title id="title">Expecto Mentoris stacked brand badge</title>
  <desc id="desc">A stacked Expecto Mentoris logo featuring a lighthouse above an open book under constellations and the mentorship tagline.</desc>
  <defs>
    <linearGradient id="badgeBg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#020712"/>
      <stop offset="58%" stop-color="#06142a"/>
      <stop offset="100%" stop-color="#02060d"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#bd7d22"/>
      <stop offset="45%" stop-color="#f2b94a"/>
      <stop offset="100%" stop-color="#ffe08c"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" x2="100%" y1="50%" y2="50%">
      <stop offset="0%" stop-color="#fff0bf" stop-opacity="0.96"/>
      <stop offset="55%" stop-color="#ffc550" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#ffc550" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="waterLine" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#294f86"/>
      <stop offset="100%" stop-color="#09131e"/>
    </linearGradient>
    <linearGradient id="rockFace" x1="10%" x2="80%" y1="10%" y2="100%">
      <stop offset="0%" stop-color="#13243f"/>
      <stop offset="55%" stop-color="#08111d"/>
      <stop offset="100%" stop-color="#02060f"/>
    </linearGradient>
    <linearGradient id="bookPaper" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f0df"/>
      <stop offset="100%" stop-color="#8ea2bf"/>
    </linearGradient>
    <radialGradient id="skyPulse" cx="46%" cy="34%" r="54%">
      <stop offset="0%" stop-color="#24549b" stop-opacity="0.92"/>
      <stop offset="45%" stop-color="#112f58" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#050a14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lanternGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7d6" stop-opacity="1"/>
      <stop offset="70%" stop-color="#ffc857" stop-opacity="0.72"/>
      <stop offset="100%" stop-color="#ffc857" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="strongGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <clipPath id="emblemClip">
      <circle cx="250" cy="250" r="214"/>
    </clipPath>
    <symbol id="emblem" viewBox="0 0 500 500">
      <circle cx="250" cy="250" r="214" fill="#04101f"/>
      <circle cx="250" cy="250" r="214" fill="url(#skyPulse)"/>
      <g clip-path="url(#emblemClip)">
        <rect x="36" y="36" width="428" height="428" fill="#030814"/>
        <circle cx="228" cy="164" r="150" fill="url(#skyPulse)"/>
        <g fill="#ffe4a0">
          <circle cx="104" cy="112" r="4"/>
          <circle cx="146" cy="102" r="5"/>
          <circle cx="184" cy="134" r="4"/>
          <circle cx="228" cy="121" r="4"/>
          <circle cx="280" cy="144" r="5"/>
          <circle cx="334" cy="114" r="4"/>
          <circle cx="380" cy="142" r="4"/>
          <circle cx="404" cy="186" r="5"/>
          <circle cx="122" cy="260" r="4"/>
          <circle cx="162" cy="224" r="3"/>
          <circle cx="206" cy="244" r="4"/>
          <circle cx="264" cy="218" r="3"/>
          <circle cx="316" cy="248" r="4"/>
          <circle cx="358" cy="224" r="4"/>
          <circle cx="392" cy="252" r="4"/>
          <circle cx="250" cy="76" r="5"/>
          <circle cx="322" cy="96" r="3"/>
          <circle cx="168" cy="164" r="3"/>
          <circle cx="346" cy="174" r="3"/>
          <circle cx="122" cy="180" r="2.5"/>
          <circle cx="410" cy="116" r="2.5"/>
        </g>
        <path d="M106 125 146 102 184 134 228 121 280 144 334 114 380 142 404 186" fill="none" stroke="rgba(255,211,109,0.55)" stroke-width="2"/>
        <path d="M122 260 162 224 206 244 264 218 316 248 358 224 392 252" fill="none" stroke="rgba(255,211,109,0.35)" stroke-width="2"/>
        <circle cx="250" cy="120" r="56" fill="url(#lanternGlow)" opacity="0.34" filter="url(#strongGlow)"/>
        <path d="M34 356 C112 304 170 294 214 324 C244 344 264 352 290 348 C324 342 348 314 388 304 C426 294 454 304 466 312 L466 466 L34 466 Z" fill="#091626"/>
        <path d="M54 384 C116 338 162 324 214 346 C246 360 272 368 302 364 C346 360 384 328 432 324 C448 324 458 328 466 334 L466 466 L54 466 Z" fill="#10233d"/>
        <rect x="34" y="392" width="432" height="74" fill="#06111d"/>
        <path d="M88 407 C140 406 188 410 236 422 C282 432 336 434 406 424" fill="none" stroke="url(#waterLine)" stroke-width="2"/>
        <path d="M82 426 C132 424 180 428 230 440 C278 450 334 450 414 438" fill="none" stroke="url(#waterLine)" stroke-width="2"/>
        <path d="M106 446 C152 444 196 448 238 458 C282 468 330 468 394 458" fill="none" stroke="url(#waterLine)" stroke-width="2"/>
        <polygon points="206,396 226,350 248,292 276,252 294,232 310,246 324,288 338,326 354,396 316,436 176,436" fill="url(#rockFace)"/>
        <path d="M208 396 236 338 248 312 262 290 276 252 294 232 310 246 320 276 306 280 286 318 270 370 250 420 Z" fill="#1e4475" opacity="0.55"/>
        <polygon points="240,262 262,262 272,166 230,166" fill="#05070d"/>
        <polygon points="240,262 258,262 264,186 238,186" fill="#15325a" opacity="0.52"/>
        <rect x="236" y="148" width="30" height="36" rx="6" fill="#0b1320"/>
        <rect x="240" y="138" width="22" height="18" rx="5" fill="#192d4e"/>
        <polygon points="232,148 270,148 260,122 242,122" fill="#0b1320"/>
        <rect x="244" y="122" width="14" height="24" fill="#f6e8bf"/>
        <circle cx="251" cy="134" r="38" fill="url(#lanternGlow)" opacity="0.9" filter="url(#softGlow)"/>
        <polygon points="256,132 430,70 430,228 264,182" fill="url(#beam)" opacity="0.95"/>
        <rect x="248" y="214" width="7" height="18" rx="2" fill="#f5d57f"/>
        <rect x="246" y="276" width="8" height="20" rx="2" fill="#f5d57f"/>
        <path d="M116 414 C152 396 200 402 250 432 C224 460 176 462 132 448 C120 444 112 432 116 414 Z" fill="#173862"/>
        <path d="M384 414 C348 396 300 402 250 432 C276 460 324 462 368 448 C380 444 388 432 384 414 Z" fill="#173862"/>
        <path d="M126 416 C160 410 204 418 242 438" fill="none" stroke="url(#bookPaper)" stroke-width="3" stroke-linecap="round"/>
        <path d="M374 416 C340 410 296 418 258 438" fill="none" stroke="url(#bookPaper)" stroke-width="3" stroke-linecap="round"/>
      </g>
      <circle cx="250" cy="250" r="214" fill="none" stroke="url(#gold)" stroke-width="5"/>
      <polygon points="250,12 255,24 268,29 255,34 250,46 245,34 232,29 245,24" fill="#f4c464"/>
      <polygon points="32,250 42,254 46,264 50,254 60,250 50,246 46,236 42,246" fill="#f4c464"/>
      <polygon points="468,250 478,254 482,264 486,254 496,250 486,246 482,236 478,246" fill="#f4c464"/>
      <polygon points="250,488 255,500 268,505 255,510 250,522 245,510 232,505 245,500" fill="#f4c464"/>
    </symbol>
  </defs>

  <rect width="900" height="1120" fill="url(#badgeBg)"/>
  <circle cx="450" cy="308" r="282" fill="#17335f" opacity="0.12" filter="url(#strongGlow)"/>
  <use href="#emblem" x="200" y="48" width="500" height="500"/>

  <g transform="translate(112 612)">
    <text x="0" y="124" fill="#f7f1e4" font-family="Georgia, 'Times New Roman', serif" font-size="118" letter-spacing="9">EXPECTO</text>
    <text x="10" y="232" fill="#f2b94a" font-family="'Arial', sans-serif" font-size="78" letter-spacing="22">MENTORIS</text>

    <line x1="20" y1="294" x2="254" y2="294" stroke="rgba(244,196,100,0.42)" stroke-width="2"/>
    <line x1="366" y1="294" x2="618" y2="294" stroke="rgba(244,196,100,0.42)" stroke-width="2"/>
    <polygon points="310,278 315,290 328,295 315,300 310,312 305,300 292,295 305,290" fill="#f4c464"/>

    <text x="18" y="380" fill="#f7f1e4" font-family="'Arial', sans-serif" font-size="42" letter-spacing="1">Mentorship that gets you there</text>
  </g>
</svg>
