<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <main class="site-main">
    <article class="offer-page">
      <div class="offer-hero">
        <div class="container container--narrow">
          <h1>{{ page.title }}</h1>
          {% if page.subtitle %}
          <p class="offer-subtitle">{{ page.subtitle }}</p>
          {% endif %}
          {% if page.cta_text %}
          <a href="{{ page.cta_url }}" class="hero-cta">{{ page.cta_text }} &rarr;</a>
          {% endif %}
        </div>
      </div>

      <div class="offer-content container container--narrow">
        {{ content }}
      </div>
    </article>
  </main>
  {% include footer.html %}
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
